experiment:
  name: variable_flow_perceiver

model:
  image_size: [256, 256]
  query_stride: 4
  rgb_patch_size: 3
  num_frequency_bands: 16
  raw_input_channels: 12
  raw_query_channels: 56
  input_width: 64
  query_width: 64
  num_latents: 512
  latent_dim: 256
  depth: 8
  self_attention_heads: 8
  cross_attention_heads: 1
  dropout: 0.0

training:
  seed: 2021
  lr: 1.0e-4
  weight_decay: 1.0e-4
  max_epochs: 20
  max_steps: null
  devices: 1
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  num_sanity_val_steps: 2
  cudnn_benchmark: true
  tb_log_images: 2
  checkpoint_every_n_epochs: 1
  check_val_every_n_epoch: 1
  alignment_weight: 1.0
  gaussian_weight: 1.0e-3
  overfit_batches: 0.0
  limit_train_batches: 1.0
  limit_val_batches: 1.0

data:
  root: /home/spencer/Data/FlyingThings3D_10k
  phase: 2
  train_split: train
  val_split: test
  pass_name: clean
  camera: left
  image_size: [256, 256]
  query_stride: 4
  rgb_patch_size: 3
  normalize_rgb: true
  batch_size: 4
  val_batch_size: 4
  num_workers: 8
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: true
  drop_last: true
  random_seed: 2021
  mask_mode: mixed
  phase2_observed_fraction_min: 0.05
  phase2_observed_fraction_max: 0.50
  phase34_view_a_fraction_min: 0.25
  phase34_view_a_fraction_max: 1.0
  phase34_view_b_fraction_min: 0.005
  phase34_view_b_fraction_max: 0.20

logging:
  tensorboard: true

analysis:
  batch_size: 4
  mask_type: random

paths:
  snapshots: /home/spencer/Projects/MotionMAE/snapshots/perceiver_variable_flow
  slurm_logs: /home/spencer/Projects/MotionMAE/slurm_logs/perceiver_variable_flow

slurm:
  machine: rc
  conda_env: cuda
  partition: cs
  cpus_per_task: 16
  gpus: 1
  mem: 64g
  time_full: 23:59:00
  time_smoke: 01:00:00
