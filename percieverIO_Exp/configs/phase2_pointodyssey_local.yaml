extends: base.yaml
experiment:
  name: phase2_pointodyssey_local

model:
  num_frequency_bands: 64
  input_width: 64
  query_width: 64
  num_latents: 512
  latent_dim: 512
  depth: 8
  self_attention_heads: 8
  cross_attention_heads: 1

training:
  max_epochs: 200
  max_steps: 2000
  devices: 1
  precision: 16-mixed
  log_every_n_steps: 10
  num_sanity_val_steps: 1
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  val_check_interval: 50
  tb_log_images: 2

data:
  dataset_name: pointodyssey
  root: /home/spencer/Data/PointOdyssey
  phase: 2
  train_split: train
  val_split: val
  pointodyssey_root: /home/spencer/Data/PointOdyssey
  pointodyssey_manifest_path: /home/spencer/Projects/MotionMAE/analysis/pointodyssey_pairs_smoke/manifest.jsonl
  pointodyssey_val_fraction: 0.1
  pointodyssey_split_seed: 2021
  pointodyssey_dt_values: [1]
  pointodyssey_trust_manifest: true
  pointodyssey_min_valid_points: 64
  image_size: [256, 256]
  query_stride: 4
  rgb_patch_size: 3
  batch_size: 4
  val_batch_size: 4
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true
  train_subset_size: null
  val_subset_size: 64
  mask_mode: mixed
  phase2_observed_fraction_min: 0.05
  phase2_observed_fraction_max: 0.50

paths:
  snapshots: /home/spencer/Projects/MotionMAE/snapshots/perceiver_variable_flow_local
  slurm_logs: /home/spencer/Projects/MotionMAE/slurm_logs/perceiver_variable_flow_local
