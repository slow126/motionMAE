experiment:
  name: flyingthings_tiny_flow_mae_dinov3_ctx_overfit
  description: >-
    Tiny local overfit check for the DINO-context masked flow MAE. Uses a single repeated batch to
    verify that the model can memorize and that the DINO/flow alignment is sane.

model:
  image_size: 256
  patch_size: 16
  flow_channels: 2
  valid_channels: 1
  context_feature_dim: 768
  encoder_dim: 384
  encoder_depth: 2
  encoder_heads: 6
  mlp_ratio: 4.0
  decoder_dim: 256
  decoder_depth: 2
  decoder_heads: 8
  dropout: 0.0
  attention_dropout: 0.0
  mask_ratio: 0.75
  observation_mask_mode: scheduled
  speckle_keep_ratio: 0.20
  speckle_dilation_kernel: 1
  scheduled_full_prob: 0.10
  scheduled_none_prob: 0.45
  loss: smooth_l1
  smooth_l1_beta: 1.0

training:
  seed: 2021
  max_epochs: 20000
  lr: 3.0e-4
  min_lr: 1.0e-6
  warmup_epochs: 0
  weight_decay: 0.0
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  tb_log_images: 2
  num_sanity_val_steps: 0
  overfit_batches: 1
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  check_val_every_n_epoch: 1000
  save_checkpoints: false
  precision: 32-true
  devices: 1
  allow_tf32: true
  cudnn_benchmark: false
  float32_matmul_precision: high

data:
  root: /home/spencer/Data/FlyingThings3D_tiny
  dino_features_root: /tmp/flyingthings_tiny_dinov3_vitb16_256x256
  dino_feature_subdir: features
  train_split: train
  val_split: test
  pass_name: clean
  camera: left
  image_size: [256, 256]
  reverse_flow: false
  normalize_rgb: true
  batch_size: 2
  val_batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  drop_last: true
  normalize_flow: true
  flow_scale: null
  max_flow_magnitude: null
  max_flow_magnitude_multiplier: 2.0

paths:
  snapshots: ./snapshots
