experiment:
  name: flyingthings_flow_mae_vits_long_resume
  description: >
    Resume from a previous FlowMAE checkpoint with fresh optimizer and lower LR.
    Adds scheduled observation masking: 10% fully visible, 40% RGB-only (no flow),
    50% existing mixed (speckle × patch, ~5% pixels visible).
    Set training.resume_ckpt to the path of your checkpoint before launching.
model:
  image_size: 256
  patch_size: 16
  rgb_channels: 6
  flow_channels: 2
  valid_channels: 1
  encoder_dim: 512
  encoder_depth: 10
  encoder_heads: 8
  mlp_ratio: 4.0
  decoder_dim: 384
  decoder_depth: 4
  decoder_heads: 8
  dropout: 0.0
  attention_dropout: 0.0
  mask_ratio: 0.75
  observation_mask_mode: scheduled
  speckle_keep_ratio: 0.2        # used for the mixed sub-mode (50% of samples)
  speckle_dilation_kernel: 1
  scheduled_full_prob: 0.10      # 10% → all flow visible
  scheduled_none_prob: 0.40      # 40% → no flow visible (RGB-only)
                                 # 50% → mixed (speckle × patch)
  loss: smooth_l1
  smooth_l1_beta: 1.0
training:
  seed: 2021
  max_epochs: 2000
  lr: 4.0e-05                    # lower than original 7.5e-5
  min_lr: 1.0e-06
  warmup_epochs: 3
  weight_decay: 0.05
  gradient_clip_val: 0.5
  log_every_n_steps: 25
  tb_log_images: 4
  pointodyssey_probe_log_images: 4
  num_sanity_val_steps: 2
  precision: 32-true
  devices: 1
  allow_tf32: true
  cudnn_benchmark: true
  float32_matmul_precision: high
  # ── Resume ─────────────────────────────────────────────────────────────────
  # Set this to the path of the checkpoint you want to warm-start from.
  # Model weights are loaded; optimizer and LR schedule start fresh.
  resume_ckpt: /home/slow1/Projects/motionMAE/snapshots_for_resume/flyingthings_flow_mae_vits_long_2026_03_23_20_58/checkpoints/last.ckpt
data:
  root: /home/slow1/Data/FlyingThings3D_Pytorch
  train_split: train
  val_split: test
  pass_name: clean
  camera: left
  image_size:
  - 256
  - 256
  reverse_flow: false
  normalize_rgb: true
  batch_size: 16
  val_batch_size: 16
  num_workers: 24
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true
  normalize_flow: true
  flow_scale: null
  max_flow_magnitude: null
  max_flow_magnitude_multiplier: 2.0
pointodyssey_probe:
  enabled: true
  source_manifest_path: analysis/pointodyssey_pairs_smoke/manifest.jsonl
  subset_indices_path: null
  pointodyssey_root: /home/slow1/Data/PointOdyssey
  num_samples: 8
  batch_size: 4
  num_workers: 0
  prefetch_factor: null
  reverse_flow: false
  trust_manifest: true
  min_valid_points: 1024
  max_pairs_per_sequence: 3
paths:
  snapshots: ./snapshots
