experiment:
  name: flyingthings_flow_mae_vits
  description: >-
    One-GPU masked flow MAE run on FlyingThings only. RGB stays visible, flow is patch-masked,
    and TensorBoard is enabled by default.

model:
  image_size: 256
  patch_size: 16
  rgb_channels: 6
  flow_channels: 2
  valid_channels: 1
  encoder_dim: 384
  encoder_depth: 6
  encoder_heads: 6
  mlp_ratio: 4.0
  decoder_dim: 256
  decoder_depth: 2
  decoder_heads: 8
  dropout: 0.0
  attention_dropout: 0.0
  mask_ratio: 0.75
  loss: smooth_l1
  smooth_l1_beta: 1.0

training:
  seed: 2021
  max_epochs: 30
  lr: 1.0e-4
  min_lr: 1.0e-6
  warmup_epochs: 3
  weight_decay: 0.05
  gradient_clip_val: 0.5
  log_every_n_steps: 25
  tb_log_images: 4
  num_sanity_val_steps: 2
  precision: 32-true
  devices: 1
  allow_tf32: true
  cudnn_benchmark: true
  float32_matmul_precision: high

data:
  root: /home/slow1/Data/FlyingThings3D_Pytorch
  train_split: train
  val_split: test
  pass_name: clean
  camera: left
  image_size: [256, 256]
  reverse_flow: false
  normalize_rgb: true
  batch_size: 16
  val_batch_size: 16
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  drop_last: true
  normalize_flow: true
  flow_scale: 128.0
  max_flow_magnitude: null
  max_flow_magnitude_multiplier: 2.0

paths:
  snapshots: ./snapshots
