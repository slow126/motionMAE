# MMD Configuration Presets
# Maximum Mean Discrepancy (MMD) with RBF kernels and Random Fourier Features (RFF)
#
# Usage:
#   from src.mmd import load_config_from_yaml
#   config = load_config_from_yaml('src/configs/mmd_configs/mmd_config.yaml')
#
# Or load a specific preset:
#   config = load_config_from_yaml('src/configs/mmd_configs/mmd_config.yaml', preset='flow_features')

# ============================================================================
# Flow Features Configuration
# ============================================================================
# For comparing flow features (typically 32-dimensional)
flow_features:
  input_dim: 32
  sigmas: [0.5, 1.0, 2.0]  # Multi-scale RBF bandwidths
  features_per_sigma: 256  # RFF features per sigma (total: 768 features)
  seed: 42
  backend: torch
  device: cuda
  unbiased: false

# ============================================================================
# Flow Vectors Configuration (4D: x, y, dx, dy)
# ============================================================================
# For comparing raw flow vectors as [x, y, dx, dy] from flow_full
flow_vectors:
  input_dim: 4  # [x, y, dx, dy]
  # Log-ish spacing in normalized units for 512x512 (sigma_px * 2/512).
  sigmas: [0.001953125, 0.0029296875, 0.00390625, 0.005859375, 0.0078125, 0.01171875, 0.015625, 0.0234375, 0.03125, 0.046875, 0.0625, 0.09375, 0.125, 0.1875, 0.25]
  # Multi-scale RBF bandwidths
  features_per_sigma: 256  # RFF features per sigma (total: 256 features)
  seed: 42
  backend: torch
  device: cuda
  unbiased: true

# ============================================================================
# DINO Features Configuration
# ============================================================================
# For comparing DINO semantic features (4096-dimensional for DINOv3 ViT-7B)
dino_features:
  input_dim: 4096
  sigmas: [0.5, 1.0, 2.0]  # Multi-scale RBF bandwidths
  features_per_sigma: 512  # Higher features for high-dimensional inputs
  seed: 42
  backend: torch
  device: cuda
  unbiased: false

# ============================================================================
# ResNet101 Features Configuration
# ============================================================================
# For comparing ResNet101 pretrained features (512-dimensional from layer 2)
resnet101_features:
  input_dim: 512  # Raw ResNet feature dimension (no projection)
  sigmas: [0.5, 1.0, 2.0, 4.0]  # Multi-scale RBF bandwidths for 512D features
  features_per_sigma: 512  # Higher features for high-dimensional inputs
  seed: 42
  backend: torch
  device: cuda
  unbiased: false

# ============================================================================
# General Purpose Configuration
# ============================================================================
# Balanced configuration for general feature comparison
general:
  input_dim: 128
  sigmas: [0.5, 1.0, 2.0]
  features_per_sigma: 256
  seed: 42
  backend: numpy
  device: null  # Auto-detect for PyTorch
  unbiased: false

# ============================================================================
# Fast Configuration
# ============================================================================
# Optimized for speed (fewer features, single sigma)
# Use for quick comparisons or large-scale experiments
fast:
  input_dim: 128
  sigmas: [1.0]  # Single sigma for speed
  features_per_sigma: 128  # Fewer features
  seed: 42
  backend: numpy
  device: null
  unbiased: false

# ============================================================================
# High Accuracy Configuration
# ============================================================================
# Optimized for accuracy (many features, fine multi-scale)
# Use when accuracy is more important than speed
accurate:
  input_dim: 128
  sigmas: [0.25, 0.5, 1.0, 2.0, 4.0]  # Fine multi-scale
  features_per_sigma: 1024  # Very high feature count
  seed: 42
  backend: torch
  device: cuda
  unbiased: false

# ============================================================================
# Unbiased Configuration
# ============================================================================
# Uses unbiased MMD estimator (excludes diagonal terms)
# Useful for statistical testing
unbiased:
  input_dim: 128
  sigmas: [0.5, 1.0, 2.0]
  features_per_sigma: 256
  seed: 42
  backend: numpy
  device: null
  unbiased: true

# ============================================================================
# CPU-only Configuration
# ============================================================================
# For systems without GPU
cpu:
  input_dim: 128
  sigmas: [0.5, 1.0, 2.0]
  features_per_sigma: 256
  seed: 42
  backend: numpy
  device: null
  unbiased: false

# ============================================================================
# Default Configuration (used when no preset specified)
# ============================================================================
# This is the default config loaded when using load_config_from_yaml()
# without specifying a preset
mmd:
  input_dim: 128
  sigmas: [0.5, 1.0, 2.0]
  features_per_sigma: 256
  seed: 42
  backend: numpy
  device: null
  unbiased: false
