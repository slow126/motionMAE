# Flow Histogram Coverage Configuration
# Calculate stratified histogram coverage between flow distributions

# Datasets to compare
datasets:
  - name: sintel
    split: train
    num_batches: 100
  - name: pointodyssey
    split: train
    num_batches: 100
  - name: synthetic
    split: train
    num_batches: 100
  - name: spair
    split: train
    num_batches: 100
  - name: flyingthings
    split: train
    num_batches: 100
  - name: pointodyssey
    split: test
    num_batches: 100
  - name: synthetic
    split: val
    num_batches: 100
  - name: kitti2012
    split: val
    num_batches: 100
  - name: kitti2015
    split: val
    num_batches: 100
  - name: spair
    split: test
    num_batches: 100
  - name: pfpascal
    split: test
    num_batches: 100
  - name: pfwillow
    split: test
    num_batches: 100
  - name: flyingthings
    split: test
    num_batches: 100
  - name: tss
    split: val
    num_batches: 100
  - name: middlebury
    split: val
    num_batches: 100

# Data loading parameters
batch_size: 16
num_workers: 16

# Histogram parameters
histogram_params:
  spatial_bins: 32      # 32x32 spatial grid
  mag_bins: 8           # Log-spaced magnitude bins
  dir_bins: 16          # Uniform direction bins over [-pi, pi)
  max_magnitude: 50.0   # Max magnitude for binning (pixels)

# Common dataset parameters
dataset_params:
  size: [512, 512]
  downsample_flow: 32
  max_kps: null
  dense_kps_use_all: true
  verbose: false
  debug: false
  normalize_images: false
  kitti_val_use_full_training: true

dataset_overrides:
  sintel:
    sintel_root: '/home/spencer/Data'
    normalize_images: true
  spair:
    datapath: './models/Datasets_CATs'
    normalize_images: false
  pfpascal:
    datapath: './models/Datasets_CATs'
    normalize_images: false
  pfwillow:
    datapath: './models/Datasets_CATs'
    normalize_images: false
  synthetic:
    geometry_config_path: 'src/configs/online_synth_configs/OnlineGeometryConfig.yaml'
    processor_config_path: 'src/configs/online_synth_configs/OnlineProcessorConfig.yaml'
    normalize_images: false
  pointodyssey:
    dataset_location: '/home/spencer/Data/PointOdyssey'
    normalize_images: true
    pointodyssey_sequence_length: 2
    pointodyssey_num_pts_to_track: 32
    use_all_valid: true
  kitti2012:
    datapath: '/home/spencer/Data/correspondence/kitti'
    normalize_images: true
  kitti2015:
    datapath: '/home/spencer/Data/correspondence/kitti'
    normalize_images: true
  flyingthings:
    datapath: '/home/spencer/Data/FlyingThings3D_tiny'
    normalize_images: true
  tss:
    datapath: '/home/spencer/Data/correspondence/TSS_CVPR2016'
    normalize_images: true
  middlebury:
    datapath: '/home/spencer/Data/middlebury/all'
    normalize_images: true

# Output options
output:
  save_results: true
  results_file: 'histogram_coverage_results.csv'
