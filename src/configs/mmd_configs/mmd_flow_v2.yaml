    is_eval: false

  - name: pointodyssey_synthetic_50_50
    split: train
    mixed: true
    datasets:
      - pointodyssey
      - synthetic
    percentages:
      - 0.5
      - 0.5
    is_eval: false

  - name: pointodyssey_synthetic_70_30
    split: train
    mixed: true
    datasets:
      - pointodyssey
