# MMD Pipeline v2.0 - Flow Representation
# Aligned with coverage_faiss_flow_full_v2.yaml

representation: flow
batch_size: 8
num_workers: 4

# Vector sampling (same as coverage)
sampling:
  max_vectors: 16000000
  flow_per_image_max: 2000
  batch_limit: 1000
  seed: 42

# MMD space selection
mmd_space: flow  # Options: "xy", "flow", "joint"

# Alpha calibration (disabled for raw flow space)
calibration:
  enabled: false
  k: 5
  aggregation: geometric_mean
  force_recompute: false

# Flow normalization (same as coverage)
flow_normalization:
  enabled: true
  scheme: norm2x1
  image_size: [512, 512]

# PCA configuration (disabled for flow)
pca:
  enabled: false

# MMD configuration
mmd_config_path: src/configs/mmd_configs/mmd_config.yaml
mmd_preset: flow_vectors  # Will be updated to match actual dim after transformation
mmd_batch_size: 20000  # Stream vectors in chunks to avoid GPU OOM

# Cache configuration (shared with coverage pipeline!)
cache:
  dir: /mnt/nvme_1tb_b/coverage_vectors  # Same as coverage cache
  mode: read_write
  format: npy
  mmap: true

# Output configuration
output:
  results_file: analysis/mmd_v2_flow_joint.csv

# Dataset parameters (same as coverage)
dataset_params:
  size: [512, 512]
  downsample_flow: 32
  max_kps: null
  dense_kps_use_all: true
  verbose: false
  debug: false
  normalize_images: false
  kitti_val_use_full_training: true

# Dataset overrides (same as coverage)
dataset_overrides:
  sintel:
    sintel_root: /home/spencer/Data
    normalize_images: true
  spair:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfpascal:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfwillow:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  synthetic:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    device: cuda
  synthetic_2d_warp:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    synthetic_flow_warp: true
    synthetic_flow_warp_swap: true
    device: cuda
  imagenet2dwarp:
    datapath: hf://ILSVRC/imagenet-1k
    hf_streaming: false
    hf_max_samples: 5000
    hf_cache_dir: /home/spencer/.cache/huggingface/datasets
    normalize_images: true
    rotation_range: [-30.0, 30.0]
    scale_range: [0.5, 2.5]
    translation_range: [-0.1, 0.1]
    shear_range: [-0.2, 0.2]
    cache_warp_params: true
    cache_dir: ./cache/imagenet2dwarp
    seed: 42
  pointodyssey:
    dataset_location: /home/spencer/Data/PointOdyssey
    normalize_images: true
    pointodyssey_sequence_length: 2
    pointodyssey_num_pts_to_track: 32
    use_all_valid: true
  kitti2012:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  kitti2015:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  flyingthings:
    datapath: /home/spencer/Data/FlyingThings3D_10k
    normalize_images: true
  tss:
    datapath: /home/spencer/Data/correspondence/TSS_CVPR2016
    normalize_images: true
  middlebury:
    datapath: /home/spencer/Data/middlebury/all
    normalize_images: true

# Dataset list (same as coverage - with is_eval flags!)
datasets:
  # Training sets
  - name: flyingthings
    split: train
    is_eval: false
  
  - name: imagenet2dwarp
    split: train
    is_eval: false
  
  - name: synthetic_2d_warp
    split: train
    is_eval: false

  - name: synthetic
    split: train
    is_eval: false
  
  - name: synthetic_small_zoom
    split: train
    is_eval: false
    overrides:
      dataset_name: synthetic
      geometry_config_overrides:
        angle_sampler:
          x_components:
            loc: 0
            scale: 0.01
          y_components:
            loc: 0
            scale: 0.01
        scale_sampler:
          abs_components:
            scale: 0.2
          rel_components:
            loc: -0.1
            scale: 0.2

  - name: synthetic_large_zoom
    split: train
    is_eval: false
    overrides:
      dataset_name: synthetic
      geometry_config_overrides:
        angle_sampler:
          x_components:
            loc: 0
            scale: 0.01
          y_components:
            loc: 0
            scale: 0.01
        scale_sampler:
          abs_components:
            scale: 0.5
          rel_components:
            loc: -0.35
            scale: 0.5

  - name: synthetic_random_flipping
    split: train
    is_eval: false
    overrides:
      dataset_name: synthetic
      geometry_config_overrides:
        random_flip: 0.5

  - name: spair
    split: train
    is_eval: false
  
  - name: pointodyssey
    split: train
    is_eval: false
  
  - name: sintel
    split: train
    is_eval: false
  
  # Evaluation sets
  - name: flyingthings
    split: test
    is_eval: true
  
  - name: kitti2015
    split: val
    is_eval: true
  
  - name: kitti2012
    split: val
    is_eval: true
  
  - name: spair
    split: test
    is_eval: true
  
  - name: pfpascal
    split: test
    is_eval: true
  
  - name: pfwillow
    split: test
    is_eval: true
  
  - name: pointodyssey
    split: test
    is_eval: true
  
  - name: tss
    split: val
    is_eval: true
  
  - name: middlebury
    split: val
    is_eval: true

  # Mixed training sets (for analysis parity)
  - name: spair_synthetic_30_70
    split: train
    mixed: true
    datasets:
      - spair
      - synthetic
    percentages:
      - 0.3
      - 0.7
    is_eval: false

  - name: spair_synthetic_50_50
    split: train
    mixed: true
    datasets:
      - spair
      - synthetic
    percentages:
      - 0.5
      - 0.5
    is_eval: false

  - name: spair_synthetic_70_30
    split: train
    mixed: true
    datasets:
      - spair
      - synthetic
    percentages:
      - 0.7
