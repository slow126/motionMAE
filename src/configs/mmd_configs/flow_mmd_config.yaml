- name: synthetic_small_zoom
  dataset_name: synthetic
  split: train
  num_batches: 500
  overrides:
    geometry_config_overrides:
      angle_sampler:
        x_components:
          loc: 0
          scale: 0.01
        y_components:
          loc: 0
          scale: 0.01
      scale_sampler:
        abs_components:
          scale: 0.2
        rel_components:
          loc: -0.1
          scale: 0.2
