# Unified experiment pipeline configuration (local fast test, DINO features).
# Run with: python scripts/run_experiment_pipeline.py --config src/configs/pipeline/leakage_free_pipeline_local_fast_dino.yaml

pipeline:
  python: python3
  workdir: .
  dry_run: false

steps:
  build_coresets:
    enabled: true
    configs:
      - src/configs/coreset_configs/build_datasets_flow_fast.yaml
      - src/configs/coreset_configs/build_datasets_dino_features_fast.yaml
      - src/configs/coreset_configs/build_mixed_datasets_flow_fast.yaml
      - src/configs/coreset_configs/build_mixed_datasets_dino_features_fast.yaml

  calculate_coverage:
    enabled: true
    runs:
      - name: flow
        args:
          coresets_dir: coresets
          representation: flow
          output: coverage_results_fast.csv
          emit_direction: train_to_eval
      - name: dino
        args:
          coresets_dir: coresets
          representation: dino
          output: coverage_dino_results_fast.csv
          emit_direction: train_to_eval

  mmd:
    enabled: true
    configs:
      flow: src/configs/mmd_configs/flow_mmd_config_fast.yaml
      feature: src/configs/mmd_configs/feature_mmd_config_dino_fast.yaml

  leakage_free_eval:
    enabled: true
    args:
      snapshots_dir:
        - snapshots
      output_dir: analysis/leakage_free_local_fast_dino
      mode: auc
      metric: pck
      auc_steps: 5000
      auc_pad: true
      additional_targets: peak_pck
      additional_target_dirs: peak_pck
      coverage_csv: coverage_results_fast.csv
      coverage_resnet_csv: coverage_resnet_results_fast.csv
      coverage_dino_csv: coverage_dino_results_fast.csv
      flow_mmd_csv: flow_mmd_results_fast.csv
      feature_mmd_csv: feature_mmd_results_fast.csv
      dino_mmd_csv: dino_mmd_results_fast.csv
      relative_target_baseline: spair
      logit_coverage: true
      rename_coverage: true
      per_encoder: true
      run_summary: true

  select_checkpoints:
    enabled: true
    args:
      snapshots_dir:
        - snapshots
      output: analysis/selected_checkpoints_local_fast.csv
      metric: pck
      select: auc
      auc_steps: 5000
      auc_pad: true

  summarize:
    enabled: true
    args:
      auc_table: analysis/leakage_free_local_fast_dino/auc_with_features.csv
      output_file: analysis/leakage_free_local_fast_dino/summary_report.txt
      predictors: flow_train_to_eval_over_eval_recall_logit,flow_eval_to_train_over_train_precision_logit,dino_train_to_eval_over_eval_recall_logit,dino_eval_to_train_over_train_precision_logit,flow_mmd,dino_mmd
      target: auc_delta
