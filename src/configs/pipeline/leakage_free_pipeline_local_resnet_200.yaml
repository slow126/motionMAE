pipeline:
  python: python3
  workdir: .
  dry_run: false
steps:
  build_coresets:
    enabled: true
    configs:
    - src/configs/coreset_configs/build_datasets_flow_200.yaml
    - src/configs/coreset_configs/build_datasets_features_resnet_200.yaml
    - src/configs/coreset_configs/build_mixed_datasets_flow_200.yaml
    - src/configs/coreset_configs/build_mixed_datasets_features_resnet_200.yaml
  calculate_coverage:
    enabled: true
    runs:
    - name: flow
      args:
        coresets_dir: coresets
        representation: flow
        output: coverage_results_200.csv
        emit_direction: train_to_eval
    - name: resnet
      args:
        coresets_dir: coresets
        representation: resnet
        output: coverage_resnet_results_200.csv
        emit_direction: train_to_eval
  mmd:
    enabled: true
    configs:
      flow: src/configs/mmd_configs/flow_mmd_config_200.yaml
      feature: src/configs/mmd_configs/feature_mmd_config_resnet_200.yaml
  leakage_free_eval:
    enabled: true
    args:
      snapshots_dir:
      - snapshots
      output_dir: analysis/leakage_free_local_resnet_200
      mode: auc
      metric: pck
      auc_steps: 5000
      auc_pad: true
      additional_targets: peak_pck
      additional_target_dirs: peak_pck
      coverage_csv: coverage_results_200.csv
      coverage_resnet_csv: coverage_resnet_results_200.csv
      flow_mmd_csv: flow_mmd_results_200.csv
      feature_mmd_csv: feature_mmd_results_resnet_200.csv
      relative_target_baseline: spair
      benchmark_normalize_predictors: zscore
      benchmark_normalize_target: none
      logit_coverage: true
      rename_coverage: true
      per_encoder: true
      run_summary: true
  select_checkpoints:
    enabled: true
    args:
      snapshots_dir:
      - snapshots
      output: analysis/selected_checkpoints_local_fast.csv
      metric: pck
      select: auc
      auc_steps: 5000
      auc_pad: true
  summarize:
    enabled: true
    args:
      auc_table: analysis/leakage_free_local_resnet_200/auc_with_features.csv
      output_file: analysis/leakage_free_local_resnet_200/summary_report.txt
      predictors: flow_train_to_eval_over_eval_recall_logit,flow_eval_to_train_over_train_precision_logit,resnet_train_to_eval_over_eval_recall_logit,resnet_eval_to_train_over_train_precision_logit,flow_mmd,feature_mmd
      target: auc_delta
