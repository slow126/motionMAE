pipeline:
  python: python3
  workdir: .
  dry_run: false
steps:
  build_coresets:
    enabled: false
    configs:
    - src/configs/coreset_configs/build_datasets_flow_200.yaml
    - src/configs/coreset_configs/build_datasets_features_resnet_200.yaml
    - src/configs/coreset_configs/build_mixed_datasets_flow_200.yaml
    - src/configs/coreset_configs/build_mixed_datasets_features_resnet_200.yaml
  calculate_coverage:
    enabled: false
    runs:
    - name: flow
      args:
        coresets_dir: coresets
        representation: flow
        output: coverage_results_200.csv
        emit_direction: train_to_eval
    - name: resnet
      args:
        coresets_dir: coresets
        representation: resnet
        output: coverage_resnet_results_200.csv
        emit_direction: train_to_eval
  mmd:
    enabled: false
    configs:
      flow: src/configs/mmd_configs/flow_mmd_config_200.yaml
      feature: src/configs/mmd_configs/feature_mmd_config_resnet_200.yaml
  leakage_free_eval:
    enabled: true
    args:
      snapshots_dir:
      - snapshots
      output_dir: analysis/leakage_free_local_resnet_200_kmeans
      mode: auc
      metric: pck
      auc_steps: 5000
      auc_pad: true
      additional_targets: peak_pck
      additional_target_dirs: peak_pck
      coverage_csv: coverage_results_200.csv
      coverage_resnet_csv: coverage_resnet_results_200.csv
      flow_mmd_csv: flow_mmd_results_200.csv
      feature_mmd_csv: feature_mmd_results_resnet_200.csv
      relative_target_baseline: spair
      benchmark_normalize_predictors: none
      benchmark_normalize_target: none
      benchmark_normalize_scope: report_only
      cv_normalize_predictors_by_benchmark: none
      cv_within_benchmark_predictor_norm: rank
      cv_normalize_predictors_by_encoder: none
      cv_demean_target_by_encoder: true
      cv_min_predictor_std: 1.0e-8
      logit_coverage: true
      rename_coverage: true
      linear_model: ridge
      ridge_alpha: 1.0
      standardize: false
      encoder_interactions: false
      encoder_main_effects: true
      exclude_encoder_configs: FT
      rank_target: true
      rank_target_source: auc_delta
      rank_target_col: auc_delta_rank
      rank_target_group: benchmark
      rank_target_with_encoder: true
      prediction_clip: true
      per_encoder: true
      run_summary: true
      prediction_target: auc_delta
      strict_dataset_match: true
      allow_unsplit_coverage: false
      allow_unsplit_mmd: false
      predictors: flow_train_to_eval_over_eval_recall_logit,flow_eval_to_train_over_train_precision_logit,resnet_train_to_eval_over_eval_recall_logit,resnet_eval_to_train_over_train_precision_logit,flow_mmd,feature_mmd
  select_checkpoints:
    enabled: false
    args:
      snapshots_dir:
      - snapshots
      output: analysis/selected_checkpoints_local_fast.csv
      metric: pck
      select: auc
      auc_steps: 5000
      auc_pad: true
  summarize:
    enabled: true
    args:
      auc_table: analysis/leakage_free_local_resnet_200_kmeans/auc_with_features.csv
      output_file: analysis/leakage_free_local_resnet_200_kmeans/summary_report.txt
      predictors: flow_train_to_eval_over_eval_recall_logit,flow_eval_to_train_over_train_precision_logit,resnet_train_to_eval_over_eval_recall_logit,resnet_eval_to_train_over_train_precision_logit,flow_mmd,feature_mmd
      target: auc_delta
