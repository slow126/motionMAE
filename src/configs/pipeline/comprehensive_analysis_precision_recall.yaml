# Comprehensive Analysis (Normalized Distance Precision/Recall Proxies)
# Uses normalized distances as precision/recall proxies (train->eval / eval, eval->train / train).
# Usage: python scripts/run_experiment_pipeline.py --config src/configs/pipeline/comprehensive_analysis_precision_recall.yaml

steps:
  leakage_free_eval:
    runs:
      - name: "Stability Selection - Distance Precision/Recall (200 bootstraps)"
        args: &pr_base
          snapshots_dir:
            - snapshots
            - snapshots_mixed
            - snapshots_raft
          mode: auc
          metric: pck
          auc_steps: 5000
          auc_pad: true
          fixed_steps: 3000
          fixed_policy: exact

          # Coverage and MMD CSVs
          coverage_csv: coverage_faiss_flow_results_fast.csv
          coverage_dino_csv: coverage_faiss_dino_results_fast.csv
          flow_mmd_csv: flow_mmd_results_fast.csv
          dino_mmd_csv: dino_mmd_results_fast.csv

          # Target configuration
          target: pck_at_3000
          prediction_target: auc_delta           # ← Fixed: predict relative performance!
          relative_target_baseline: spair        # Creates auc_delta = pck - baseline
          additional_targets: auc_delta
          additional_target_dirs: pck_at_3000_delta

          # Predictor transformations
          logit_coverage: false
          distance_ratio_transform: log1p
          radius_transform: log

          # Model configuration
          linear_model: ridge
          ridge_alpha: 0.5
          standardize: true
          cv_standardize_mode: global

          # Target demeaning (uses new fixed model_family_encoder)
          cv_demean_target_by_encoder: true
          cv_demean_target_by_benchmark: false  # ← Don't demean by benchmark for relative targets!

          # LOBO/LOTO centering preferences
          # DON'T demean relative targets (auc_delta already removes baseline intercept)
          lobo_model_centered: false  # ← Fixed: don't demean relative targets!
          loto_benchmark_centered: false  # ← Fixed: don't demean relative targets!

          # Exclude encoder effects from predictors
          encoder_main_effects: false
          encoder_interactions: false

          # Per-encoder reports
          per_encoder: true
          run_summary: true

          # Precision/recall proxies via normalized distances (log1p)
          predictors: "flow_train_to_eval_mean_dist_over_radius_eval,flow_eval_to_train_mean_dist_over_radius_train,dino_train_to_eval_mean_dist_over_radius_eval,dino_eval_to_train_mean_dist_over_radius_train"

          # Stability selection configuration
          run_stability_selection: true
          stability_n_bootstrap: 200
          stability_threshold: 0.7

          output_dir: analysis/comprehensive/stability_precision_recall_only

      - name: "Univariate Comparison - Distance Precision/Recall"
        args:
          <<: *pr_base
          run_univariate_comparison: true
          output_dir: analysis/comprehensive/univariate_precision_recall_only

      - name: "Univariate Comparison - Distance Precision/Recall (Per-Encoder Options)"
        args:
          <<: *pr_base
          run_univariate_comparison: true
          output_dir: analysis/comprehensive/univariate_precision_recall_only_per_encoder

      - name: "Stability Selection - Distance Precision/Recall (No SPAIR) (200 bootstraps)"
        args:
          <<: *pr_base
          exclude_train_datasets: spair
          output_dir: analysis/comprehensive/stability_precision_recall_only_no_spair

      - name: "Univariate Comparison - Distance Precision/Recall (No SPAIR)"
        args:
          <<: *pr_base
          exclude_train_datasets: spair
          run_univariate_comparison: true
          output_dir: analysis/comprehensive/univariate_precision_recall_only_no_spair

      - name: "Univariate Comparison - Distance Precision/Recall (Per-Encoder, No SPAIR)"
        args:
          <<: *pr_base
          exclude_train_datasets: spair
          run_univariate_comparison: true
          output_dir: analysis/comprehensive/univariate_precision_recall_only_per_encoder_no_spair

      - name: "Stability Selection - Distance Precision/Recall + MMD (200 bootstraps)"
        args:
          <<: *pr_base
          predictors: "flow_train_to_eval_mean_dist_over_radius_eval,flow_eval_to_train_mean_dist_over_radius_train,flow_mmd,dino_train_to_eval_mean_dist_over_radius_eval,dino_eval_to_train_mean_dist_over_radius_train,dino_mmd"
          output_dir: analysis/comprehensive/stability_precision_recall_mmd

      - name: "Univariate Comparison - Distance Precision/Recall + MMD"
        args:
          <<: *pr_base
          predictors: "flow_train_to_eval_mean_dist_over_radius_eval,flow_eval_to_train_mean_dist_over_radius_train,flow_mmd,dino_train_to_eval_mean_dist_over_radius_eval,dino_eval_to_train_mean_dist_over_radius_train,dino_mmd"
          run_univariate_comparison: true
          output_dir: analysis/comprehensive/univariate_precision_recall_mmd

      - name: "Univariate Comparison - Distance Precision/Recall + MMD (Per-Encoder Options)"
        args:
          <<: *pr_base
          predictors: "flow_train_to_eval_mean_dist_over_radius_eval,flow_eval_to_train_mean_dist_over_radius_train,flow_mmd,dino_train_to_eval_mean_dist_over_radius_eval,dino_eval_to_train_mean_dist_over_radius_train,dino_mmd"
          run_univariate_comparison: true
          output_dir: analysis/comprehensive/univariate_precision_recall_mmd_per_encoder

      - name: "Stability Selection - Distance Precision/Recall + MMD (No SPAIR) (200 bootstraps)"
        args:
          <<: *pr_base
          exclude_train_datasets: spair
          predictors: "flow_train_to_eval_mean_dist_over_radius_eval,flow_eval_to_train_mean_dist_over_radius_train,flow_mmd,dino_train_to_eval_mean_dist_over_radius_eval,dino_eval_to_train_mean_dist_over_radius_train,dino_mmd"
          output_dir: analysis/comprehensive/stability_precision_recall_mmd_no_spair

      - name: "Univariate Comparison - Distance Precision/Recall + MMD (No SPAIR)"
        args:
          <<: *pr_base
          exclude_train_datasets: spair
          predictors: "flow_train_to_eval_mean_dist_over_radius_eval,flow_eval_to_train_mean_dist_over_radius_train,flow_mmd,dino_train_to_eval_mean_dist_over_radius_eval,dino_eval_to_train_mean_dist_over_radius_train,dino_mmd"
          run_univariate_comparison: true
          output_dir: analysis/comprehensive/univariate_precision_recall_mmd_no_spair

      - name: "Univariate Comparison - Distance Precision/Recall + MMD (Per-Encoder, No SPAIR)"
        args:
          <<: *pr_base
          exclude_train_datasets: spair
          predictors: "flow_train_to_eval_mean_dist_over_radius_eval,flow_eval_to_train_mean_dist_over_radius_train,flow_mmd,dino_train_to_eval_mean_dist_over_radius_eval,dino_eval_to_train_mean_dist_over_radius_train,dino_mmd"
          run_univariate_comparison: true
          output_dir: analysis/comprehensive/univariate_precision_recall_mmd_per_encoder_no_spair
