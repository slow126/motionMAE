# Online Synthetic Geometry Configuration


# Shader configurations
shaders:
  # program0: "./rendering/shaders/terrain_sdf.glsl"
  program0: "./rendering/shaders/mandelbulb_background_new.glsl"
  program1: "./rendering/shaders/quatJulia.c"
  program2: "./rendering/shaders/quatJulia.c"
  program3: "./rendering/shaders/deformed_sphere.glsl"
  merge: "./rendering/shaders/merge.glsl"



# Mandelbulb sampler configuration
mandelbulb_sampler:
  power_range:
    min: 1.5
    offset: 2.5



# Dataset settings
num_samples: 1000
random_flip: 0.0
random_swap: true
julia_sampler:
  distribution: uniform
  loc: 3
  scale: 9
angle_sampler:
  x_components:
    distribution: uniform
    loc: -0.16667
    scale: 0.33333
  y_components:
    distribution: uniform
    loc: -0.16667
    scale: 0.33333
scale_sampler:
  abs_components:
    distribution: uniform
    loc: 0.5
    scale: 0.4
  rel_components:
    distribution: uniform
    loc: -0.25
    scale: 0.25

# Dataset size and sampling
num_samples: 30000  # Total number of samples to generate

# Image configuration
size: 256  # [height, width]
crop: "center"

# Random seed
seed: 987654321 


