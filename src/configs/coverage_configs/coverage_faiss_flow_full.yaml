representation: flow
encoder: resnet101
batch_size: 8
num_workers: 4
sampling:
  max_vectors: 16000000  # 16M vectors: 2000 flows/image * 8000 images
  flow_per_image_max: 2000  # Max flows per image
  batch_limit: 1000  # Max batches per dataset (batch_size=8, so up to 8000 images)
  dense_threshold: 300000
  dense_fraction: 0.1
  dense_min_keep: 20000
  seed: 42
pca:
  enabled: false
  output_dim: 256
  fit_on: train
  max_train_vectors: 200000
  whiten: false
faiss:
  index_factory: IVF4096,Flat
  metric: l2
  use_gpu: true
  nprobe: 64
normalization:
  mode: global_block_alpha  # Options: 'none', 'train_zscore', 'global_block_alpha'
  # none: No normalization (just [-1,1] pixel coords)
  # train_zscore: Per-train whitening (each train defines its own metric - hard to compare across trains)
  # global_block_alpha: Global α-balancing [x, y, α·dx, α·dy] for cross-train comparability
  apply_to:
  - flow  # Apply normalization to flow representation
  eps: 1.0e-6  # Small epsilon to avoid division by zero
coverage:
  k: 5  # Use 5-NN for coverage (more robust than 1-NN)
  self_radius_k: 5  # Use 5th NN for robust self-radius estimation
  radius_quantile: 0.95
  neighbor_agg: first
  kl_method: knn
  kl_knn_k: 20
  kl_bins: 50
  kl_eps: 1.0e-6
cache:
  dir: /mnt/nvme_1tb_b/coverage_vectors
  mode: read_write  # 'read', 'write', 'read_write', or 'off'
  format: npy
  mmap: true
  mix_from_cache: true
  pairwise: true
  # AUTOMATIC CACHING (saved in same directory):
  # 1. Vectors: {dataset}_{split}_{repr}.npy
  # 2. Global α: global_alpha_{repr}.npz (computed once, validated by train set list)
  # 3. Self-radii: radius_{dataset}_{split}_{repr}_{metric}_{mode}_k{k}_q{q}_{agg}.npy
  #
  # SPEEDUP WITH global_block_alpha:
  #   - 1st run: Compute α (~2s) + all radii (~5-10 min)
  #   - 2nd+ runs: Load α + all radii → only 1-NN searches (~10-15 min total)
  #   - Eval radii are globally cached (not train-specific!)
  #
  # Delete caches if you change: k, quantile, neighbor_agg, normalization mode, or train set list
output:
  results_file: coverage_faiss_flow_results_fast.csv
dataset_params:
  size:
  - 512
  - 512
  downsample_flow: 32
  max_kps: null
  dense_kps_use_all: true
  verbose: false
  debug: false
  normalize_images: false
  kitti_val_use_full_training: true
dataset_overrides:
  sintel:
    sintel_root: /home/spencer/Data
    normalize_images: true
  spair:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfpascal:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfwillow:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  synthetic:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    device: cuda
  synthetic_2d_warp:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    synthetic_flow_warp: true
    synthetic_flow_warp_swap: true
    device: cuda
  imagenet2dwarp:
    datapath: hf://ILSVRC/imagenet-1k
    hf_streaming: false
    hf_max_samples: 5000
    hf_cache_dir: /home/spencer/.cache/huggingface/datasets
    normalize_images: true
    rotation_range: [-30.0, 30.0]
    scale_range: [0.5, 2.5]
    translation_range: [-0.1, 0.1]
    shear_range: [-0.2, 0.2]
    cache_warp_params: true
    cache_dir: ./cache/imagenet2dwarp
    seed: 42
  pointodyssey:
    dataset_location: /home/spencer/Data/PointOdyssey
    normalize_images: true
    pointodyssey_sequence_length: 2
    pointodyssey_num_pts_to_track: 32
    use_all_valid: true
  kitti2012:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  kitti2015:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  flyingthings:
    datapath: /home/spencer/Data/FlyingThings3D_10k
    normalize_images: true
  tss:
    datapath: /home/spencer/Data/correspondence/TSS_CVPR2016
    normalize_images: true
  middlebury:
    datapath: /home/spencer/Data/middlebury/all
    normalize_images: true
