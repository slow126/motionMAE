# Coverage Pipeline v2.0 - Flow-Only Representation (FAST TEST)
# Single 2D flow space (dx, dy) - no spatial coordinates
# Subset of datasets for quick testing

representation: flow
encoder: resnet101  # Not used for flow, but kept for compatibility
batch_size: 8
num_workers: 4

# Vector sampling configuration
sampling:
  max_vectors: 16000000  # 16M vectors total across all images
  vectors_per_image: 2048  # Target vectors per image (up to 2048 per sample)
  seed: 42

# Space configuration for flow-only
spaces:
  enabled: ["flow"]  # ONLY flow space (dx, dy) - no xy, no joint
  
# Alpha calibration (disabled - no joint space)
calibration:
  enabled: false  # No joint space = no alpha needed
  k: 5
  aggregation: geometric_mean
  force_recompute: false

# Flow normalization to [-1, 1]
flow_normalization:
  enabled: true  # Normalize [x,y,dx,dy] to [-1,1] centered at zero
  scheme: norm2x1  # 2*x/W-1 for positions, 2*dx/W for flow
  image_size: [512, 512]  # Default image size (will be overridden per dataset if needed)

# PCA configuration (disabled for flow)
pca:
  enabled: false
  output_dim: 256
  fit_on: train
  whiten: false
  l2_normalize: false

# FAISS configuration (tuned for 3090 24GB VRAM, 2D flow is very fast)
faiss:
  index_factory: IVF4096,Flat
  metric: l2
  use_gpu: true
  nprobe: 128
  batch_size: 250000  # Higher batch for 2D (was 100k for 4D)

# Coverage metrics configuration
coverage:
  self_radius_k: 5
  radius_quantile: 0.95
  neighbor_agg: kth
  k_max: 5
  k_values: [1, 5]
  compute_qnorm: true
  compute_rnorm: true
  compute_curves: true
  curve_quantiles: [0.80, 0.90, 0.95, 0.99]

# Distance metric metadata
distance_metric:
  name: sqL2
  description: "Squared L2 distances from FAISS (no sqrt applied)"

# Cache configuration
cache:
  dir: /mnt/nvme_1tb_b/coverage_vectors
  mode: read_write
  format: npy
  mmap: true

# Output configuration
output:
  results_file: analysis/coverage_v2_flow_only_fast.csv
  curves_file: analysis/coverage_v2_flow_only_curves_fast.csv
  save_curves_to_main: false

# Dataset parameters
dataset_params:
  size: [512, 512]
  downsample_flow: 32
  max_kps: null
  dense_kps_use_all: true
  verbose: false
  debug: false
  normalize_images: false
  kitti_val_use_full_training: true

# Dataset overrides
dataset_overrides:
  sintel:
    sintel_root: /home/spencer/Data
    normalize_images: true
  spair:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfpascal:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfwillow:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  synthetic:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    device: cuda
  imagenet2dwarp:
    datapath: hf://ILSVRC/imagenet-1k
    hf_streaming: false
    hf_max_samples: 5000
    hf_cache_dir: /home/spencer/.cache/huggingface/datasets
    normalize_images: true
    rotation_range: [-30.0, 30.0]
    scale_range: [0.5, 2.5]
    translation_range: [-0.1, 0.1]
    shear_range: [-0.2, 0.2]
    cache_warp_params: true
    cache_dir: ./cache/imagenet2dwarp
    seed: 42
  kitti2012:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  kitti2015:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  flyingthings:
    datapath: /home/spencer/Data/FlyingThings3D_10k
    normalize_images: true
  tss:
    datapath: /home/spencer/Data/correspondence/TSS_CVPR2016
    normalize_images: true

# Dataset list (FAST TEST - subset of datasets)
datasets:
  # Training sets (3 datasets - fast ones, no synthetic)
  - name: flyingthings
    split: train
    representation: flow
    is_eval: false
  
  - name: imagenet2dwarp
    split: train
    representation: flow
    is_eval: false
  
  - name: sintel
    split: train
    representation: flow
    is_eval: false
  
  # Evaluation sets (7 datasets)
  - name: flyingthings
    split: test
    representation: flow
    is_eval: true
  
  - name: spair
    split: test
    representation: flow
    is_eval: true
  
  - name: tss
    split: val
    representation: flow
    is_eval: true
  
  - name: kitti2015
    split: val
    representation: flow
    is_eval: true
  
  - name: kitti2012
    split: val
    representation: flow
    is_eval: true
  
  - name: pfpascal
    split: test
    representation: flow
    is_eval: true
  
  - name: pfwillow
    split: test
    representation: flow
    is_eval: true
