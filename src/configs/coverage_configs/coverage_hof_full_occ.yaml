        y_components:
          loc: 0
          scale: 0.01
      scale_sampler:
        abs_components:
          scale: 0.5
        rel_components:
          loc: -0.35
          scale: 0.5
- name: synthetic_random_flipping
  split: train
  representation: flow
  is_eval: false
  overrides:
    dataset_name: synthetic
    geometry_config_overrides:
      random_flip: 0.5
