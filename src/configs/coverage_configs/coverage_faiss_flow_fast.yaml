representation: flow
encoder: resnet101
batch_size: 16
num_workers: 4
sampling:
  max_vectors: 1000000
  dense_threshold: 300000
  dense_fraction: 0.1
  dense_min_keep: 20000
  seed: 42
pca:
  enabled: false
  output_dim: 256
  fit_on: train
  max_train_vectors: 200000
  whiten: false
faiss:
  index_factory: HNSW32
  metric: l2
  use_gpu: false
  nprobe: 16
coverage:
  k: 1
  radius_quantile: 0.95
  kl_method: knn
  kl_knn_k: 20
  kl_bins: 50
  kl_eps: 1.0e-6
output:
  results_file: coverage_faiss_flow_results_fast.csv
dataset_params:
  size:
  - 512
  - 512
  downsample_flow: 32
  max_kps: null
  dense_kps_use_all: true
  verbose: false
  debug: false
  normalize_images: false
  kitti_val_use_full_training: true
dataset_overrides:
  sintel:
    sintel_root: /home/spencer/Data
    normalize_images: true
  spair:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfpascal:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfwillow:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  synthetic:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    device: cuda
  synthetic_2d_warp:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    synthetic_flow_warp: true
    synthetic_flow_warp_swap: true
    device: cuda
  imagenet2dwarp:
    datapath: hf://ILSVRC/imagenet-1k
    hf_streaming: false
    hf_max_samples: 5000
    hf_cache_dir: /home/spencer/.cache/huggingface/datasets
    normalize_images: true
    rotation_range: [-30.0, 30.0]
    scale_range: [0.5, 2.5]
    translation_range: [-0.1, 0.1]
    shear_range: [-0.2, 0.2]
    cache_warp_params: true
    cache_dir: ./cache/imagenet2dwarp
    seed: 42
  pointodyssey:
    dataset_location: /home/spencer/Data/PointOdyssey
    normalize_images: true
    pointodyssey_sequence_length: 2
    pointodyssey_num_pts_to_track: 32
    use_all_valid: true
  kitti2012:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  kitti2015:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  flyingthings:
    datapath: /home/spencer/Data/FlyingThings3D_tiny
    normalize_images: true
  tss:
    datapath: /home/spencer/Data/correspondence/TSS_CVPR2016
    normalize_images: true
  middlebury:
    datapath: /home/spencer/Data/middlebury/all
    normalize_images: true
datasets:
- name: imagenet2dwarp
  split: train
  representation: flow
  num_batches: 100
  is_eval: false
- name: spair_2d_warp_70_30
  split: train
  num_batches: 5
  mixed: true
  datasets:
  - spair
  - imagenet2dwarp
  percentages:
  - 0.7
  - 0.3
- name: spair_2d_warp_50_50
  split: train
  num_batches: 5
  mixed: true
  datasets:
  - spair
  - imagenet2dwarp
  percentages:
  - 0.5
  - 0.5
- name: spair_2d_warp_30_70
  split: train
  num_batches: 5
  mixed: true
  datasets:
  - spair
  - imagenet2dwarp
  percentages:
