  - 0.7
- name: synthetic
  split: train
  representation: flow
  num_batches: 100
  is_eval: false
  output: coresets/synthetic_train_flow.pt
- name: synthetic_2d_warp
  split: train
  representation: flow
  num_batches: 100
  is_eval: false
  output: coresets/synthetic_2d_warp_train_flow.pt
- name: synthetic_small_zoom
  dataset_name: synthetic
  split: train
  representation: flow
  num_batches: 100
  is_eval: false
  overrides:
    geometry_config_overrides:
      angle_sampler:
        x_components:
          loc: 0
          scale: 0.01
        y_components:
          loc: 0
          scale: 0.01
      scale_sampler:
        abs_components:
          scale: 0.2
        rel_components:
          loc: -0.1
          scale: 0.2
  output: coresets/synthetic_small_zoom_train_flow.pt
- name: synthetic_large_zoom
  dataset_name: synthetic
  split: train
  representation: flow
  num_batches: 100
  is_eval: false
