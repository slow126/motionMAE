        y_components:
          loc: 0
          scale: 0.01
      scale_sampler:
        abs_components:
          scale: 0.5
        rel_components:
          loc: -0.35
          scale: 0.5
  output: coresets/synthetic_large_zoom_train_flow.pt
- name: synthetic_random_flipping
