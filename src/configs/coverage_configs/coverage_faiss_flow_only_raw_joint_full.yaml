#
# Coverage Pipeline v2.1 - Flow-Only RAW (FULL)
# Epsilon curves on raw flow (dx, dy) without self-radius normalization
#

representation: flow
encoder: resnet101  # Not used for flow, kept for compatibility
batch_size: 8
num_workers: 4

# Vector sampling configuration
sampling:
  max_vectors: 16000000  # 16M vectors total across all images
  vectors_per_image: 2048  # Target vectors per image (up to 2048 per sample)
  seed: 42
  shuffle: true

# Flow normalization (enabled to map pixels to [-1, 1])
flow_normalization:
  enabled: true
  scheme: norm2x1
  image_size: [512, 512]

# Space selection for flow vectors
flow_space: joint  # flow | xy | joint
joint_alpha: 1.0  # Only used when flow_space=joint

# Epsilon curve configuration (pixel space, converted when normalized)
epsilon_curves:
  enabled: true
  values_px: [0.5, 0.75, 1, 1.5, 2, 3, 4, 6, 8, 12, 16, 24, 32, 48, 64]

# K-means codebook configuration (used by k-means coverage script)
kmeans:
  enabled: true
  k: 8192
  train_max: null
  niter: 20
  nredo: 1
  seed: 42
  use_gpu: true
  force_recompute: true
  require_cache: true
  batch_size: 500000

# K-means manifold (self-radius on centroids)
kmeans_manifold:
  self_radius_k: 1
  radius_quantile: 0.95
  neighbor_agg: kth
  weighted_radius: true

# FAISS configuration (2D flow is very fast)
faiss:
  index_factory: IVF4096,Flat
  metric: l2
  use_gpu: true
  nprobe: 128
  batch_size: 250000

# Distance metric metadata
distance_metric:
  name: sqL2
  description: "Squared L2 distances from FAISS (no sqrt applied)"

# Cache configuration
cache:
  dir: /mnt/nvme_1tb_b/coverage_vectors
  mode: read_write
  format: npy
  mmap: true

# Output configuration
output:
  results_file: analysis/coverage_v2_flow_only_raw_joint_full.csv
  curves_file: analysis/coverage_v2_flow_only_raw_joint_curves_full.csv
  kmeans_results_file: analysis/coverage_v2_flow_only_raw_joint_kmeans_full.csv
  kmeans_curves_file: analysis/coverage_v2_flow_only_raw_joint_kmeans_curves_full.csv
  kmeans_manifold_results_file: analysis/coverage_v2_flow_only_raw_joint_kmeans_manifold_full.csv

# Dataset parameters
dataset_params:
  size: [512, 512]
  downsample_flow: 32
  max_kps: null
  dense_kps_use_all: true
  verbose: false
  debug: false
  normalize_images: false
  kitti_val_use_full_training: true

# Dataset overrides
dataset_overrides:
  sintel:
    sintel_root: /home/spencer/Data
    normalize_images: true
  spair:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfpascal:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfwillow:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  synthetic:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    device: cuda
  synthetic_2d_warp:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    synthetic_flow_warp: true
    synthetic_flow_warp_swap: true
    device: cuda
  imagenet2dwarp:
    datapath: hf://ILSVRC/imagenet-1k
    hf_streaming: false
    hf_max_samples: 5000
    hf_cache_dir: /home/spencer/.cache/huggingface/datasets
    normalize_images: true
    rotation_range: [-30.0, 30.0]
    scale_range: [0.5, 2.5]
    translation_range: [-0.1, 0.1]
    shear_range: [-0.2, 0.2]
    cache_warp_params: true
    cache_dir: ./cache/imagenet2dwarp
    seed: 42
  pointodyssey:
    dataset_location: /home/spencer/Data/PointOdyssey
    normalize_images: true
    pointodyssey_sequence_length: 2
    pointodyssey_num_pts_to_track: 32
    use_all_valid: true
  kitti2012:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  kitti2015:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  flyingthings:
    datapath: /home/spencer/Data/FlyingThings3D_10k
    normalize_images: true
  tss:
    datapath: /home/spencer/Data/correspondence/TSS_CVPR2016
    normalize_images: true
  middlebury:
    datapath: /home/spencer/Data/middlebury/all
    normalize_images: true

# Dataset list (FULL - train and eval sets)
datasets:
  # Training sets
  - name: flyingthings
    split: train
    representation: flow
    is_eval: false

  - name: imagenet2dwarp
    split: train
    representation: flow
    is_eval: false

  - name: synthetic_2d_warp
    split: train
    representation: flow
    is_eval: false

  - name: synthetic
    split: train
    representation: flow
    is_eval: false

  - name: synthetic_small_zoom
    split: train
    representation: flow
    is_eval: false
    overrides:
      dataset_name: synthetic
      geometry_config_overrides:
        angle_sampler:
          x_components:
            loc: 0
            scale: 0.01
          y_components:
            loc: 0
            scale: 0.01
        scale_sampler:
          abs_components:
            scale: 0.2
          rel_components:
            loc: -0.1
            scale: 0.2

  - name: synthetic_large_zoom
    split: train
    representation: flow
    is_eval: false
    overrides:
      dataset_name: synthetic
      geometry_config_overrides:
        angle_sampler:
          x_components:
            loc: 0
            scale: 0.01
          y_components:
            loc: 0
            scale: 0.01
        scale_sampler:
          abs_components:
            scale: 0.5
          rel_components:
            loc: -0.35
            scale: 0.5

  - name: synthetic_random_flipping
    split: train
    representation: flow
    is_eval: false
    overrides:
      dataset_name: synthetic
      geometry_config_overrides:
        random_flip: 0.5

  - name: spair
    split: train
    representation: flow
    is_eval: false

  - name: pointodyssey
    split: train
    representation: flow
    is_eval: false

  - name: sintel
    split: train
    representation: flow
    is_eval: false

  # Evaluation sets
  - name: flyingthings
    split: test
    representation: flow
    is_eval: true

  - name: kitti2015
    split: val
    representation: flow
    is_eval: true

  - name: kitti2012
    split: val
    representation: flow
    is_eval: true

  - name: spair
    split: test
    representation: flow
    is_eval: true

  - name: pfpascal
    split: test
    representation: flow
    is_eval: true

  - name: pfwillow
    split: test
    representation: flow
    is_eval: true

  - name: pointodyssey
    split: test
    representation: flow
    is_eval: true

  - name: tss
    split: val
    representation: flow
    is_eval: true

  - name: middlebury
    split: val
    representation: flow
    is_eval: true

  # Mixed training sets (for coverage analysis)
  - name: spair_synthetic_30_70
    split: train
    mixed: true
    datasets:
      - spair
      - synthetic
    percentages:
      - 0.3
      - 0.7
    is_eval: false

  - name: spair_synthetic_50_50
    split: train
    mixed: true
    datasets:
      - spair
      - synthetic
