# Coverage Pipeline v2.0 - ResNet Representation (FAST TEST)
# Single feature space with PCA + L2 normalization
# Reduced dataset list for quick testing

representation: resnet
encoder: resnet101  # ResNet-101
batch_size: 8  # Larger batch than DINO (ResNet is lighter)
num_workers: 4

# Vector sampling configuration
sampling:
  max_vectors: 8000000  # 8M feature vectors total (~7800 images × 1024 patches)
  vectors_per_image: 1024  # All spatial patches per image (32×32 grid)
  seed: 42

# Space configuration for features
spaces:
  enabled: ["features"]  # Single feature space (no decomposition)
  
# Alpha calibration (disabled for features)
calibration:
  enabled: false  # No α for single-space representations

# Flow normalization (disabled for features)
flow_normalization:
  enabled: false  # Not applicable to features

# PCA configuration (REQUIRED for ResNet - 2048 dims → 256 dims)
pca:
  enabled: true  # CRITICAL: Reduce dimensionality for FAISS
  output_dim: 256  # Target dimensionality
  fit_on: train  # Fit PCA on training data only
  whiten: false  # No whitening
  l2_normalize: true  # CRITICAL: Normalize to unit length after PCA
  max_train_vectors: 500000  # Max vectors for fitting PCA

# FAISS configuration (tuned for 3090 24GB VRAM with 256-D vectors)
faiss:
  index_factory: IVF4096,Flat  # IVF for speed (critical for 256-D)
  metric: l2  # L2 on unit vectors = cosine similarity
  use_gpu: true
  nprobe: 128  # High nprobe for accuracy (~99% recall)
  batch_size: 50000  # Smaller batch for 256-D vectors

# Coverage metrics configuration
coverage:
  # Self-radius computation (Step 3)
  self_radius_k: 5
  radius_quantile: 0.95
  neighbor_agg: kth
  
  # Cross-dataset distances (Step 4)
  k_max: 5
  k_values: [1, 5]
  
  # Dual normalization (Step 5)
  compute_qnorm: true
  compute_rnorm: true
  
  # Coverage curves (Step 5b)
  compute_curves: true
  curve_quantiles: [0.80, 0.90, 0.95, 0.99]

# Distance metric metadata
distance_metric:
  name: sqL2
  description: "Squared L2 distances from FAISS (no sqrt applied)"

# Cache configuration
cache:
  dir: /mnt/nvme_1tb_b/coverage_vectors
  mode: read_write
  format: npy
  mmap: true

# Output configuration
output:
  results_file: analysis/coverage_v2_resnet_fast.csv
  curves_file: analysis/coverage_v2_resnet_fast_curves.csv
  save_curves_to_main: false

# Dataset parameters
dataset_params:
  size: [512, 512]
  downsample_flow: 32
  max_kps: null
  dense_kps_use_all: true
  verbose: false
  debug: false
  normalize_images: false
  kitti_val_use_full_training: true

# Dataset overrides
dataset_overrides:
  sintel:
    sintel_root: /home/spencer/Data
    normalize_images: true
  spair:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfpascal:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfwillow:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  imagenet2dwarp:
    datapath: hf://ILSVRC/imagenet-1k
    hf_streaming: false
    hf_max_samples: 5000
    hf_cache_dir: /home/spencer/.cache/huggingface/datasets
    normalize_images: true
    rotation_range: [-30.0, 30.0]
    scale_range: [0.5, 2.5]
    translation_range: [-0.1, 0.1]
    shear_range: [-0.2, 0.2]
    cache_warp_params: true
    cache_dir: ./cache/imagenet2dwarp
    seed: 42
  kitti2012:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  kitti2015:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  flyingthings:
    datapath: /home/spencer/Data/FlyingThings3D_10k
    normalize_images: true
  tss:
    datapath: /home/spencer/Data/correspondence/TSS_CVPR2016
    normalize_images: true
  synthetic:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    device: cuda

# Dataset list - FAST TEST VERSION
datasets:
  # Training sets (FAST: 3 datasets)
  - name: flyingthings
    split: train
    representation: resnet
    is_eval: false
  
  - name: imagenet2dwarp
    split: train
    representation: resnet
    is_eval: false
  
  - name: sintel
    split: train
    representation: resnet
    is_eval: false
  
  # Evaluation sets (FAST: 7 quick datasets)
  - name: flyingthings
    split: test
    representation: resnet
    is_eval: true
  
  - name: kitti2015
    split: val
    representation: resnet
    is_eval: true
  
  - name: kitti2012
    split: val
    representation: resnet
    is_eval: true
  
  - name: spair
    split: test
    representation: resnet
    is_eval: true
  
  - name: pfpascal
    split: test
    representation: resnet
    is_eval: true
  
  - name: pfwillow
    split: test
    representation: resnet
    is_eval: true
  
  - name: tss
    split: val
    representation: resnet
    is_eval: true
