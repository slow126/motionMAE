representation: resnet
encoder: resnet101
batch_size: 8
num_workers: 4
sampling:
  max_vectors: 8000000  # 8M vectors: 1024 patches/image (32x32) * 8000 images
  batch_limit: 1000  # Max batches per dataset (batch_size=8, so up to 8000 images)
  dense_threshold: 100000
  dense_fraction: 0.05
  dense_min_keep: 2000
  seed: 42
pca:
  enabled: true
  output_dim: 256
  fit_on: train
  max_train_vectors: 200000
  whiten: false
faiss:
  index_factory: IVF4096,Flat
  metric: cosine
  use_gpu: true
  nprobe: 64
coverage:
  k: 5  # Use 5-NN for coverage (more robust than 1-NN)
  self_radius_k: 5  # Use 5th NN for robust self-radius estimation
  radius_quantile: 0.95
  neighbor_agg: first
cache:
  dir: /mnt/nvme_1tb_b/coverage_vectors
  mode: read_write
  format: npy
  mmap: true
  mix_from_cache: true
  pairwise: true
output:
  results_file: coverage_faiss_resnet_results.csv
dataset_params:
  size:
  - 512
  - 512
  downsample_flow: 32
  max_kps: null
  dense_kps_use_all: true
  verbose: false
  debug: false
  normalize_images: false
  kitti_val_use_full_training: true
dataset_overrides:
  sintel:
    sintel_root: /home/spencer/Data
    normalize_images: true
  spair:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfpascal:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  pfwillow:
    datapath: ./models/Datasets_CATs
    normalize_images: false
  synthetic:
    geometry_config_path: src/configs/online_synth_configs/OnlineGeometryConfig.yaml
    processor_config_path: src/configs/online_synth_configs/OnlineProcessorConfig.yaml
    normalize_images: false
    device: cuda
  pointodyssey:
    dataset_location: /home/spencer/Data/PointOdyssey
    normalize_images: true
    pointodyssey_sequence_length: 2
    pointodyssey_num_pts_to_track: 32
    use_all_valid: true
  kitti2012:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  kitti2015:
    datapath: /home/spencer/Data/correspondence/kitti
    normalize_images: true
  flyingthings:
    datapath: /home/spencer/Data/FlyingThings3D_10k
    normalize_images: true
  tss:
    datapath: /home/spencer/Data/correspondence/TSS_CVPR2016
    normalize_images: true
  middlebury:
    datapath: /home/spencer/Data/middlebury/all
    normalize_images: true
datasets:
# FlyingThings first for fast failure detection
- name: flyingthings
  split: train
  representation: resnet
  num_batches: 100
  is_eval: false
  output: coresets/flyingthings_train_resnet.pt
- name: synthetic
  split: train
  representation: resnet
  num_batches: 100
  is_eval: false
  output: coresets/synthetic_train_resnet.pt
- name: synthetic_small_zoom
  dataset_name: synthetic
  split: train
  representation: resnet
  num_batches: 100
  is_eval: false
  overrides:
    geometry_config_overrides:
      angle_sampler:
        x_components:
          loc: 0
          scale: 0.01
        y_components:
          loc: 0
          scale: 0.01
      scale_sampler:
        abs_components:
          scale: 0.2
        rel_components:
          loc: -0.1
          scale: 0.2
  output: coresets/synthetic_small_zoom_train_resnet.pt
- name: synthetic_large_zoom
  dataset_name: synthetic
  split: train
  representation: resnet
  num_batches: 100
  is_eval: false
  overrides:
    geometry_config_overrides:
      angle_sampler:
        x_components:
          loc: 0
          scale: 0.01
        y_components:
          loc: 0
          scale: 0.01
      scale_sampler:
        abs_components:
          scale: 0.5
        rel_components:
          loc: -0.35
          scale: 0.5
  output: coresets/synthetic_large_zoom_train_resnet.pt
- name: synthetic_random_flipping
  dataset_name: synthetic
  split: train
  representation: resnet
  num_batches: 100
  is_eval: false
  overrides:
    geometry_config_overrides:
      random_flip: 0.5
  output: coresets/synthetic_random_flipping_train_resnet.pt
- name: sintel
  split: train
  representation: resnet
  num_batches: 100
  is_eval: false
  output: coresets/sintel_train_resnet.pt
- name: spair
  split: train
  representation: resnet
  num_batches: 100
  is_eval: false
  output: coresets/spair_train_resnet.pt
- name: pointodyssey
  split: train
  representation: resnet
  num_batches: 100
  is_eval: false
  output: coresets/pointodyssey_train_resnet.pt
# FlyingThings test first for fast failure detection
