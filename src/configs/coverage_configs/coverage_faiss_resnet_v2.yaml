    split: val
    representation: resnet
    is_eval: true
  
  - name: kitti2012
    split: val
    representation: resnet
    is_eval: true
  
  - name: spair
    split: test
    representation: resnet
    is_eval: true
  
  - name: pfpascal
    split: test
    representation: resnet
    is_eval: true
  
  - name: pfwillow
    split: test
    representation: resnet
    is_eval: true
  
  - name: pointodyssey
    split: test
    representation: resnet
    is_eval: true
  
  - name: tss
    split: val
    representation: resnet
    is_eval: true
  
  - name: middlebury
    split: val
    representation: resnet
    is_eval: true
  
  # Mixed training sets (for coverage analysis)
