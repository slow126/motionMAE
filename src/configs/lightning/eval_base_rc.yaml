# Base Evaluation Configuration
# This file contains default evaluation parameters
# These can be overridden in sweep configs if needed

evaluation:
  eval_benchmarks: ['flyingthings', 'tss', 'middlebury', 'synthetic', 'pfpascal', 'pfwillow', 'spair', 'kitti2012', 'kitti2015', 'pointodyssey']
  eval_alphas: [0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05]
  thres: 'img'  # 'auto', 'img', 'bbox', 'bbox-kp'
  split_to_use_for_validation: 'test'  # 'val' or 'test'
  val_batch_size: 8
  val_num_workers: 32
  prefetch_factor: 2
  
  # Motion-aware evaluation parameters
  use_motion_aware: false  # If true, compute motion-aware metrics (PCK on moving keypoints only)
  min_motion_pixels: 5.0  # Minimum motion magnitude (in pixels) for motion-aware PCK
  zero_threshold: 0.5  # Flow magnitude threshold below which flow is considered "zero"

  # Benchmark dataset paths
  datapath: './models/Datasets_CATs'
  tss_root: '/home/slow1/Data/correspondence/TSS_CVPR2016'
  kitti_root: '/home/slow1/Data/correspondence/kitti'
  kitti_val_use_full_training: true
  pointodyssey_root: '/home/slow1/Data/PointOdyssey'
  flyingthings_root: '/home/slow1/Data/FlyingThings3D_Pytorch'
  middlebury_root: '/home/slow1/Data/middlebury/all'
  
  # Validation dataset parameters (overrides for specific benchmarks)
  val_datasets:
    synthetic:
      geometry_config_path: 'src/configs/online_synth_configs/OnlineGeometryConfig_Val.yaml'
      processor_config_path: 'src/configs/online_synth_configs/OnlineProcessorConfig.yaml'
      normalize_images: false
    pointodyssey:
      pointodyssey_sequence_length: 2
      pointodyssey_num_pts_to_track: 32  # Minimum requirement; use_all_valid will get all valid trajectories
      use_all_valid: true  # Get all valid trajectories instead of limiting to num_pts_to_track
      val_sequence_fraction: 0.2
      normalize_images: true
      split: 'test'
    kitti2012:
      split: 'val'  # or 'training' if kitti_val_use_full_training is true
      normalize_images: true
    kitti2015:
      split: 'val'
      normalize_images: true
    flyingthings:
      split: 'test'
      normalize_images: true
      val_dataset_fraction: 0.2  # Use only 20% of FlyingThings for faster validation
    middlebury:
      normalize_images: true
      reverse_flow: false