# ImageNet 2D Warp Dataset Configuration (local)
# Contains only dataset-specific parameters

dataset:
  dataset_name: 'imagenet2dwarp'
  split: 'train'
  size: [512, 512]
  downsample_flow: 32
  max_kps: null  # null = no truncation, test all keypoints
  dense_kps_use_all: true  # when dense flow exists, extract all valid kps (set false to sample up to max_kps)
  verbose: false
  debug: false
  normalize_images: true  # Use ImageNet normalization for ImageNet images
  datapath: 'hf://ILSVRC/imagenet-1k'
  hf_streaming: false
  hf_cache_dir: '/home/spencer/.cache/huggingface/datasets'
  # hf_max_samples: null

  # Warp parameters (defaults shown for clarity)
  rotation_range: [-30.0, 30.0]
  scale_range: [0.5, 2.5]
  translation_range: [-0.1, 0.1]
  shear_range: [-0.2, 0.2]

  # Cache settings (use a writable cache outside the dataset root)
  cache_warp_params: true
  cache_dir: './cache/imagenet2dwarp'
  seed: 42
