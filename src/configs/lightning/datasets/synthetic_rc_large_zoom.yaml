# Synthetic Dataset Configuration
# Contains only dataset-specific parameters

dataset:
  dataset_name: 'synthetic'
  split: 'train'
  size: [512, 512]
  downsample_flow: 32
  max_kps: null  # null = no truncation, test all keypoints
  dense_kps_use_all: true  # when dense flow exists, extract all valid kps (set false to sample up to max_kps)
  verbose: false
  debug: false
  normalize_images: false  # Synthetic already normalized by processor; leave false to avoid double-norm
  
  # Synthetic-specific parameters
  geometry_config_path: 'src/configs/online_synth_configs/OnlineGeometryConfig.yaml'
  processor_config_path: 'src/configs/online_synth_configs/OnlineProcessorConfig.yaml'
  opengl_device_index: null  # null = auto-detect
  
  # Geometry config overrides (optional)
  # Overrides for synthetic_small_angle_large_scale experiment (mostly zooming in)
  geometry_config_overrides:
    angle_sampler:
      x_components:
        loc: 0
        scale: 0.01
      y_components:
        loc: 0
        scale: 0.01
    scale_sampler:
      abs_components:
        scale: 0.5
      rel_components:
        loc: -0.35
        scale: 0.5