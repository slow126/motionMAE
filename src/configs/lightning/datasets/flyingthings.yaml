# FlyingThings Dataset Configuration
# Contains only dataset-specific parameters

dataset:
  dataset_name: 'flyingthings'
  split: 'train'
  size: [512, 512]
  downsample_flow: 32
  max_kps: null  # null = no truncation
  dense_kps_use_all: true  # use all valid kps for dense flow; set false to sample up to max_kps
  verbose: false
  debug: false
  normalize_images: true
  
  # FlyingThings-specific parameters
  datapath: '/home/spencer/Data/FlyingThings3D_tiny'
  reverse_flow: true
  # Note: subsample_flow, use_valid_mask, filter_out_of_bounds may not be supported
  # by CorrespondenceDataset's FlyingThingsSimpleDataset wrapper
