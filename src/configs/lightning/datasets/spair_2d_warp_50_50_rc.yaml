# Mixed SPair + ImageNet2DWarp Dataset Configuration (50-50 split, RC)
# Contains only dataset-specific parameters

dataset:
  mixed: true
  datasets: ['spair', 'imagenet2dwarp']
  percentages: [0.5, 0.5]  # 50% SPair, 50% ImageNet2DWarp

  # Common parameters (applied to all datasets unless overridden)
  split: 'train'
  size: [512, 512]
  downsample_flow: 32
  max_kps: null  # null = no truncation, test all keypoints
  dense_kps_use_all: true  # when dense flow exists, extract all valid kps (set false to sample up to max_kps)
  verbose: false
  debug: false

  # Optional: epoch_size (if None, uses sum of all dataset lengths)
  epoch_size: null

  # Optional: seed for reproducibility in sampling
  seed: 42

  # Dataset-specific overrides
  dataset_overrides:
    spair:
      datapath: './models/Datasets_CATs'
      normalize_images: false  # SPair is already normalized
    imagenet2dwarp:
      datapath: 'hf://ILSVRC/imagenet-1k'
      hf_streaming: false
      hf_cache_dir: '/home/slow1/Data/hf_cache/datasets'
      # hf_max_samples: null
      normalize_images: true
      rotation_range: [-30.0, 30.0]
      scale_range: [0.5, 2.5]
      translation_range: [-0.1, 0.1]
      shear_range: [-0.2, 0.2]
      cache_warp_params: true
      cache_dir: './cache/imagenet2dwarp'
      seed: 42
