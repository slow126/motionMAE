# Training Configuration for PointOdyssey Dataset

model:
  backbone: 'resnet101'
  freeze: true
  pretrained_backbone: true

training:
  epochs: 50
  batch_size: 2
  n_threads: 16
  seed: 2021
  lr: 3e-4
  lr_backbone: 3e-6
  weight_decay: 0.05
  momentum: 0.9
  scheduler: 'step'
  step: '[70, 80, 90]'
  step_gamma: 0.5
  steps_per_epoch: null
  augmentation: false
  min_flow_length: null
  max_flow_length: null
  mmd_every_n_epochs: 0  # 0 = disabled, 1 = every epoch, 2 = every other epoch, etc.

  # Flow filtering (training only)
  min_flow_length: null
  max_flow_length: null

  # MMD calculation during validation
  mmd_every_n_epochs: 0  # 0 = disabled, 1 = every epoch, 2 = every other epoch, etc.

  enable_debug: false
  debug_visualization_benchmarks: None
  debug_visualization_persist: false

  steps_per_epoch: 100

  eval_initial: true

dataset:
  dataset_name: 'pointodyssey'
  split: 'train'
  size: [512, 512]
  downsample_flow: 32
  max_kps: null  # null = no truncation, use all keypoints
  dense_kps_use_all: true  # keep all valid points unless capped
  verbose: false
  debug: false
  normalize_images: true
  
  # PointOdyssey-specific parameters
  dataset_location: '/home/spencer/Data/PointOdyssey'
  pointodyssey_use_augs: false
  pointodyssey_sequence_length: 2
  pointodyssey_num_pts_to_track: 32
  pointodyssey_strides: [1, 2, 4]
  pointodyssey_quick: false
  reverse_flow: true
  thres: 'img'
  use_all_valid: true  # Use all valid points (no truncation)
  pointodyssey_disable_motion_filter: true

# Evaluation parameters
evaluation:
  # eval_benchmarks: [ 'flyingthings', 'tss', 'synthetic', 'pfpascal', 'pfwillow', 'spair', 'kitti2012', 'kitti2015']
  # eval_alphas: [0.01, 0.01, 0.01, 0.05, 0.05, 0.1, 0.1, 0.1]
  # eval_benchmarks: ['kitti2012', 'kitti2015', 'pointodyssey', 'flyingthings', 'tss', 'synthetic', 'pfpascal', 'pfwillow', 'spair']
  # eval_alphas: [0.01, 0.01, 0.01, 0.05, 0.05, 0.1, 0.1, 0.1, 0.1]
  eval_benchmarks: ['spair']
  eval_alphas: [0.1]
  thres: 'img'  # 'auto', 'img', 'bbox', 'bbox-kp'
  split_to_use_for_validation: 'test'  # 'val' or 'test'
  val_batch_size: 8
  val_num_workers: 32
  prefetch_factor: 2
  
  # Motion-aware evaluation parameters
  use_motion_aware: false  # If true, compute motion-aware metrics (PCK on moving keypoints only)
  min_motion_pixels: 5.0  # Minimum motion magnitude (in pixels) for motion-aware PCK
  zero_threshold: 0.5  # Flow magnitude threshold below which flow is considered "zero"
  
  # Benchmark dataset paths
  datapath: './models/Datasets_CATs'
  tss_root: '/home/spencer/Data/correspondence/TSS_CVPR2016'
  kitti_root: '/home/spencer/Data/correspondence/kitti'
  kitti_val_use_full_training: true
  pointodyssey_root: '/home/spencer/Data/PointOdyssey'
  flyingthings_root: '/home/spencer/Data/FlyingThings3D_tiny'
  
  # Validation dataset parameters (overrides for specific benchmarks)
  val_datasets:
    synthetic:
      geometry_config_path: 'src/configs/online_synth_configs/OnlineGeometryConfig_Val.yaml'
      processor_config_path: 'src/configs/online_synth_configs/OnlineProcessorConfig.yaml'
      normalize_images: false
    pointodyssey:
      pointodyssey_sequence_length: 4
      pointodyssey_num_pts_to_track: 32  # Minimum requirement; use_all_valid will get all valid trajectories
      use_all_valid: true  # Get all valid trajectories instead of limiting to num_pts_to_track
      val_sequence_fraction: 0.2
      normalize_images: true
      split: 'test'
    kitti2012:
      split: 'val'  # or 'training' if kitti_val_use_full_training is true
      normalize_images: true
    kitti2015:
      split: 'val'
      normalize_images: true
    flyingthings:
      split: 'test'
      normalize_images: true
      val_dataset_fraction: 0.2  # Use only 20% of FlyingThings for faster validation

# Paths
paths:
  snapshots: './snapshots'
  pretrained: null  # Path to pretrained model or null
  start_epoch: 0  # -1 for new training, or epoch number to resume
